name: Generate Factsheets

on:
  workflow_dispatch:
    inputs:
      factors:
        description: 'Space-separated factor ids to refresh (leave blank for all)'
        required: false
        default: ''
      skip_commit:
        description: 'Build artefacts only — no commit and no PR'
        required: false
        type: boolean
        default: false

  schedule:
    - cron: '0 6 * * *'

  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-factsheets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Export CSVs & render PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APERIODIC_API_KEY: ${{ secrets.APERIODIC_API_KEY }}

    steps:
      # Pinned to v5: actions/checkout@v6 breaks the create-pull-request
      # step below with `remote: Duplicate header: "Authorization"` (HTTP
      # 400). Revert to @v6 once the upstream incompatibility is fixed.
      # https://github.com/peter-evans/create-pull-request/issues/4272
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      # Defensive fallback only — Mona Sans (the brand font) is bundled in
      # scripts/factsheet/assets/fonts/; without any sans the PDF hits DejaVu.
      - name: Install Inter font
        run: sudo apt-get update && sudo apt-get install -y fonts-inter

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API key is configured
        run: |
          if [ -z "$APERIODIC_API_KEY" ]; then
            echo "::error::APERIODIC_API_KEY secret is not configured"
            exit 1
          fi

      - name: Determine factors to build
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "factors=${{ github.event.inputs.factors }}" >> "$GITHUB_OUTPUT"
          else
            echo "factors=" >> "$GITHUB_OUTPUT"
          fi

      - name: Export CSVs (returns + factor data)
        run: python -m scripts.export_data ${{ steps.scope.outputs.factors }}

      - name: Generate PDF factsheets
        run: python -m scripts.generate_factsheets ${{ steps.scope.outputs.factors }}

      - name: Show generated artefacts
        run: |
          echo "Returns:"; ls -lh data/portfolio-40-returns || true
          echo; echo "Factor data:"; ls -lh data/raw-factors || true
          echo; echo "Factor analysis:"; ls -lh .internal/factor-analysis || true
          echo; echo "Factsheets:"; ls -lh factsheets || true
          echo; echo "Previews:"; ls -lh notebooks/preview || true

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: factsheets
          path: |
            data/portfolio-40-returns
            data/raw-factors
            .internal/factor-analysis
            factsheets
            notebooks/preview
          if-no-files-found: error

      - name: Commit refreshed data back to the branch
        if: ${{ github.ref_name != 'main' && github.event.inputs.skip_commit != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage before the diff check so first-run untracked dirs count.
          git add data/ .internal/ factsheets/ notebooks/preview/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(Data): Refresh factsheet CSVs and PDFs

          Generated by .github/workflows/generate-factsheets.yml
          Branch: ${GITHUB_REF_NAME}
          Triggered by: ${GITHUB_ACTOR}"
          # A concurrent run (e.g. the notebooks workflow) may push first; rebase and retry.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done
          exit 1

      # `main` is branch-protected, so the daily refresh lands via an
      # auto-merged PR (below) rather than a direct push. Schedule /
      # manual-dispatch / push-to-main open (or update) the refresh PR.
      - name: Open PR with refreshed data
        id: cpr
        if: ${{ github.ref_name == 'main' && github.event.inputs.skip_commit != 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: automation/refresh-factsheets
          add-paths: |
            data/
            .internal/
            factsheets/
            notebooks/preview/
          commit-message: "chore(Data): Refresh factsheet CSVs and PDFs"
          title: "chore(Data): Factsheet data refresh"
          body: |
            Automated refresh of the data-room artefacts — daily returns CSVs,
            raw factor-data CSVs, the rendered two-page PDF factsheets, and the
            per-factor preview PNGs (notebooks/preview/) — for **all factors**.

            Trigger: `${{ github.event_name }}`. Generated by
            `.github/workflows/generate-factsheets.yml`.

            Scheduled runs auto-merge once branch-protection requirements are
            met; for manual / `main` triggers, review the diff and merge.
          delete-branch: true

      - name: Auto-merge the scheduled refresh
        if: ${{ github.event_name == 'schedule' && steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR" --squash --delete-branch --auto \
            || gh pr merge "$PR" --squash --delete-branch
