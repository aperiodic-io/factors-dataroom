name: Render Multi-Factor Notebook

# The multi-factor portfolio notebook is hand-maintained (not generated from the
# factor catalog), so generate-notebooks.yml's catalog run doesn't cover it on
# feature branches. This lightweight workflow executes just that one notebook on
# pushes to non-main branches and commits the rendered copy back, so an open PR
# shows up-to-date outputs. (main / the weekly refresh are handled by the
# dedicated step in generate-notebooks.yml.)

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
      - 'automation/**'
    paths:
      - notebooks/00_multi_factor_portfolio_construction.ipynb
      - requirements.txt
      - .github/workflows/render-multi-factor.yml

permissions:
  contents: write

concurrency:
  group: render-multi-factor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: Execute & commit the multi-factor notebook
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APERIODIC_API_KEY: ${{ secrets.APERIODIC_API_KEY }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API key is configured
        run: |
          if [ -z "$APERIODIC_API_KEY" ]; then
            echo "::error::APERIODIC_API_KEY secret is not configured"
            exit 1
          fi

      - name: Execute the notebook
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.kernel_name=python3 \
            --ExecutePreprocessor.timeout=1800 \
            notebooks/00_multi_factor_portfolio_construction.ipynb

      - name: Redact any leaked secrets
        run: python -m scripts.redact_secrets notebooks/00_multi_factor_portfolio_construction.ipynb

      - name: Commit the rendered notebook back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notebooks/00_multi_factor_portfolio_construction.ipynb
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          # Pushes authored by GITHUB_TOKEN don't retrigger workflows; the
          # [skip ci] tag is belt-and-suspenders against a render -> push -> render loop.
          git commit -m "chore(Notebooks): Render multi-factor portfolio notebook [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done
          exit 1
