name: Generate Notebooks

on:
  workflow_dispatch:

  schedule:
    - cron: '0 6 * * 1'

  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-notebooks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate & execute factor notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      APERIODIC_API_KEY: ${{ secrets.APERIODIC_API_KEY }}
      NOTEBOOK_JOBS: '4'

    steps:
      # Pinned to v5: actions/checkout@v6 breaks the create-pull-request
      # step below with `remote: Duplicate header: "Authorization"` (HTTP
      # 400). Revert to @v6 once the upstream incompatibility is fixed.
      # https://github.com/peter-evans/create-pull-request/issues/4272
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API key is configured
        run: |
          if [ -z "$APERIODIC_API_KEY" ]; then
            echo "::error::APERIODIC_API_KEY secret is not configured"
            exit 1
          fi

      - name: Generate and execute notebooks
        run: python -m scripts.generate_factor_notebooks --execute

      - name: Execute the multi-factor portfolio notebook
        # Hand-maintained notebook (not generated from scripts/factors_catalog.py),
        # so it lives outside generate_factor_notebooks.py. Execute it in place
        # against the live API so the committed copy carries rendered outputs.
        # `always()` refreshes it independently of the catalog notebooks above;
        # the commit / PR steps below already stage all of notebooks/.
        if: always()
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.kernel_name=python3 \
            --ExecutePreprocessor.timeout=1800 \
            notebooks/00_multi_factor_portfolio_construction.ipynb

      - name: Redact any leaked secrets from notebooks
        if: always()
        run: python -m scripts.redact_secrets notebooks/*.ipynb

      - name: Upload notebooks artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebooks
          path: notebooks/
          if-no-files-found: error

      - name: Upload execution diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-diagnostics
          path: ci-artifacts/
          if-no-files-found: ignore

      - name: Commit executed notebooks back to the branch
        if: ${{ always() && github.event_name == 'push' && github.ref_name != 'main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notebooks/
          if git diff --cached --quiet; then
            echo "No notebook changes to commit."
            exit 0
          fi
          git commit -m "chore(Notebooks): Regenerate and execute factor notebooks

          Branch: ${GITHUB_REF_NAME}
          Triggered by: ${GITHUB_ACTOR}"
          # A concurrent run (e.g. the factsheets workflow) may push first; rebase and retry.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done
          exit 1

      - name: Open PR with refreshed notebooks
        id: cpr
        if: ${{ success() && (github.event_name != 'push' || github.ref_name == 'main') }}
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: automation/refresh-notebooks
          add-paths: notebooks/
          commit-message: "chore(Notebooks): Regenerate and execute factor notebooks"
          title: "chore(Notebooks): Refresh factor analysis notebooks"
          body: |
            Automated regeneration of the factor notebooks from
            `scripts/factors_catalog.py`, executed against the live Aperiodic Factors API.

            Trigger: `${{ github.event_name }}`.

            Scheduled runs auto-merge once branch-protection requirements are
            met; for manual / `main` triggers, review the diff and merge.
          delete-branch: true

      - name: Auto-merge the scheduled refresh
        if: ${{ github.event_name == 'schedule' && steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR" --squash --delete-branch --auto \
            || gh pr merge "$PR" --squash --delete-branch
